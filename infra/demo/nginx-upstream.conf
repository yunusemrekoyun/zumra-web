# Load-balance the two app instances (compose: app on 3004, app2 on 3005).
# Copy to /etc/nginx/conf.d/zumra-upstream.conf so it loads at the http level,
# then point the site's proxy_pass at http://zumra_app.
upstream zumra_app {
    server 127.0.0.1:3004;
    server 127.0.0.1:3005;
    keepalive 32;
}
