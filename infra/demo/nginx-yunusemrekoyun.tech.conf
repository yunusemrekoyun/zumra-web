# System nginx site for the Zümra demo.
# Copy to /etc/nginx/sites-available/yunusemrekoyun.tech, symlink into
# sites-enabled, then run certbot --nginx to add TLS (it upgrades this to 443
# and adds the http->https redirect automatically).

server {
    listen 80;
    listen [::]:80;
    server_name yunusemrekoyun.tech www.yunusemrekoyun.tech;

    client_max_body_size 100m;
    server_tokens off;

    # Auth-gated media: the app returns X-Accel-Redirect: /protected-media/...
    # and nginx serves the file straight from disk.
    location /protected-media/ {
        internal;
        alias /srv/zumra/data/media/;
        sendfile on;
        aio threads;
        directio 8m;
    }

    # Large / streamed media transfers — disable buffering, long timeout.
    location = /api/media {
        proxy_pass http://zumra_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 900s;
    }

    # Mailpit web inbox (shown when mail mode = test) — basic-auth protected.
    # The mailpit container runs with MP_WEBROOT=mail so its assets resolve
    # under /mail/. Create the credential with:
    #   htpasswd -c /etc/nginx/zumra-mail.htpasswd <user>
    location /mail/ {
        auth_basic "Zumra Mail";
        auth_basic_user_file /etc/nginx/zumra-mail.htpasswd;
        proxy_pass http://127.0.0.1:8025;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        proxy_pass http://zumra_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}
