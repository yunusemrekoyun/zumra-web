upstream zumra_app {
    include /etc/nginx/zumra/upstream.conf;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name zumraakademi.com www.zumraakademi.com;

    ssl_certificate /etc/nginx/tls/origin.pem;
    ssl_certificate_key /etc/nginx/tls/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    include /etc/nginx/zumra/cloudflare-real-ip.conf;

    client_max_body_size 100m;
    server_tokens off;

    location /protected-media/ {
        internal;
        alias /srv/zumra/data/media/;
        sendfile on;
        aio threads;
        directio 8m;
    }

    location = /api/media {
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 900s;
        proxy_pass http://zumra_app;
        include /etc/nginx/zumra/proxy.conf;
    }

    location / {
        proxy_pass http://zumra_app;
        include /etc/nginx/zumra/proxy.conf;
    }
}
