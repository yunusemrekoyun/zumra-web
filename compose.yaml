name: zumra-local

services:
  postgres:
    image: postgres:17.10-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
      BACKUP_DB_USER: ${BACKUP_DB_USER}
      BACKUP_DB_PASSWORD: ${BACKUP_DB_PASSWORD}
      TZ: UTC
      PGTZ: UTC
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init-roles.sh:/docker-entrypoint-initdb.d/10-init-roles.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:8.8.0-alpine
    restart: unless-stopped
    environment:
      REDIS_ADMIN_PASSWORD: ${REDIS_ADMIN_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      - /bin/sh
      - -ec
      - |
        printf 'user default on >%s ~* +@all\nuser zumra on >%s ~zumra:* +@all -@dangerous +info\n' "$$REDIS_ADMIN_PASSWORD" "$$REDIS_PASSWORD" > /data/users.acl
        exec redis-server /usr/local/etc/redis/redis.conf --aclfile /data/users.acl
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
      - ./infra/docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --user zumra --pass \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 12
    security_opt:
      - no-new-privileges:true

  mailpit:
    image: axllent/mailpit:v1.27.8
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    security_opt:
      - no-new-privileges:true

  clamav:
    image: clamav/clamav-debian:1.4.3
    restart: unless-stopped
    environment:
      CLAMD_CONF_AlertExceedsMax: "yes"
      CLAMD_CONF_ConcurrentDatabaseReload: "no"
      CLAMD_CONF_MaxFileSize: 110M
      CLAMD_CONF_MaxScanSize: 200M
      CLAMD_CONF_StreamMaxLength: 110M
    ports:
      - "127.0.0.1:3310:3310"
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "printf 'PING\n' | nc 127.0.0.1 3310 | grep PONG"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 2m
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
  redis_data:
  clamav_data:
